services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: taskboard-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "TaskBoard_Dev123!"
    ports:
      - "1433:1433"
    volumes:
      - taskboard-sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "TaskBoard_Dev123!" -C -Q "SELECT 1" || exit 1
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

volumes:
  taskboard-sqldata:
