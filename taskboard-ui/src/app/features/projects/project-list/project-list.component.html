<div class="page-header">
  <h1>Projects</h1>
  <button mat-raised-button color="primary" (click)="openCreateDialog()">
    <mat-icon>add</mat-icon>
    New Project
  </button>
</div>

<div class="loading-container" *ngIf="isLoading$ | async">
  <mat-spinner diameter="48"></mat-spinner>
</div>

<div class="error-message" *ngIf="error$ | async as error">
  {{ error }}
</div>

<mat-card *ngIf="!(isLoading$ | async)">
  <mat-card-content>
    <table mat-table [dataSource]="(projects$ | async) || []" class="full-width">

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let project">
          <a [routerLink]="['/projects', project.id]" class="project-link">
            {{ project.name }}
          </a>
          <div class="project-description" *ngIf="project.description">
            {{ project.description }}
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="ownerName">
        <th mat-header-cell *matHeaderCellDef>Owner</th>
        <td mat-cell *matCellDef="let project">{{ project.ownerName }}</td>
      </ng-container>

      <ng-container matColumnDef="memberCount">
        <th mat-header-cell *matHeaderCellDef>Members</th>
        <td mat-cell *matCellDef="let project">
          <div class="count-cell">
            <mat-icon class="count-icon">people</mat-icon>
            {{ project.memberCount }}
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="taskCount">
        <th mat-header-cell *matHeaderCellDef>Tasks</th>
        <td mat-cell *matCellDef="let project">
          <div class="count-cell">
            <mat-icon class="count-icon">assignment</mat-icon>
            {{ project.taskCount }}
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let project">
          <span [class]="project.isArchived ? 'status-archived' : 'status-active'">
            {{ project.isArchived ? 'Archived' : 'Active' }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let project">
          <button mat-icon-button [routerLink]="['/projects', project.id]" matTooltip="View project">
            <mat-icon>visibility</mat-icon>
          </button>
          <button mat-icon-button [routerLink]="['/projects', project.id, 'tasks']" matTooltip="View tasks">
            <mat-icon>assignment</mat-icon>
          </button>
          <button mat-icon-button [routerLink]="['/projects', project.id, 'board']" matTooltip="Board view">
            <mat-icon>view_kanban</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell empty-row" [attr.colspan]="displayedColumns.length">
          No projects found. Create your first project!
        </td>
      </tr>
    </table>
  </mat-card-content>
</mat-card>
